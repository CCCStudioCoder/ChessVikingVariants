<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Play Chess Viking's variant</title>
</head>
<body>
    <div class="board">
    </div>
    <script>
        async function render() {
            const html = await fetch("/board").then(r => r.text());
            const board = document.querySelector(".board");
            board.innerHTML = html;
        }

        render();
    </script>
</body>
</html>
